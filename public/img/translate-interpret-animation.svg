<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="tiSphere1" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" /> <!-- Emerald primary -->
      <stop offset="70%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="tiSphere2" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" /> <!-- Emerald Light -->
      <stop offset="70%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="tiSphere3" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#6ee7b7;stop-opacity:1" /> <!-- Emerald Lighter -->
      <stop offset="70%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </radialGradient>
    <filter id="tiSphereShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Raised effect in center -->
  <ellipse cx="100" cy="100" rx="25" ry="8" fill="#f8f9fa" opacity="0.6" class="tiBreathing"/>
  <ellipse cx="100" cy="100" rx="20" ry="6" fill="#e9ecef" opacity="0.4" class="tiBreathing"/>

  <!-- Transparent emerald pulsing sphere in center -->
  <circle cx="100" cy="100" r="12" fill="#10b981" opacity="0.3" class="tiPulseCenter"/>

  <!-- Orbit 1 Group with dashed connections (Emerald Light) -->
  <g class="tiOrbit1">
    <circle cx="100" cy="50" r="4" fill="url(#tiSphere2)" filter="url(#tiSphereShadow)" opacity="0.8" class="tiPathFollow1"/>
    <circle cx="150" cy="100" r="3" fill="#34d399" opacity="0.7" class="tiPathFollow2"/>
    <circle cx="100" cy="150" r="5" fill="url(#tiSphere3)" filter="url(#tiSphereShadow)" opacity="0.8" class="tiPathFollow3"/>
    <circle cx="50" cy="100" r="3" fill="#047857" opacity="0.7" class="tiPathFollow4"/>
    <!-- Dashed connections for orbit 1 -->
    <line x1="100" y1="50" x2="150" y2="100" stroke="#34d399" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="150" y1="100" x2="100" y2="150" stroke="#34d399" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="100" y1="150" x2="50" y2="100" stroke="#34d399" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="50" y1="100" x2="100" y2="50" stroke="#34d399" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  </g>

  <!-- Orbit 2 Group with dashed connections (Emerald Lighter) -->
  <g class="tiOrbit2">
    <circle cx="120" cy="80" r="3" fill="#6ee7b7" opacity="0.7" class="tiPathFollow5"/>
    <circle cx="80" cy="120" r="4" fill="url(#tiSphere1)" filter="url(#tiSphereShadow)" opacity="0.8" class="tiPathFollow6"/>
    <circle cx="120" cy="120" r="3" fill="#34d399" opacity="0.7" class="tiPathFollow7"/>
    <circle cx="80" cy="80" r="3" fill="#047857" opacity="0.7" class="tiPathFollow8"/>
    <!-- Dashed connections for orbit 2 -->
    <line x1="120" y1="80" x2="80" y2="120" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="80" y1="120" x2="120" y2="120" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="120" y1="120" x2="80" y2="80" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="80" y1="80" x2="120" y2="80" stroke="#6ee7b7" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  </g>

  <!-- Orbit 3 Group with dashed connections (Emerald Dark) -->
  <g class="tiOrbit3">
    <circle cx="130" cy="70" r="3" fill="#059669" opacity="0.7" class="tiPathFollow9"/>
    <circle cx="70" cy="130" r="4" fill="url(#tiSphere2)" filter="url(#tiSphereShadow)" opacity="0.8" class="tiPathFollow10"/>
    <circle cx="130" cy="130" r="3" fill="#10b981" opacity="0.7" class="tiPathFollow11"/>
    <circle cx="70" cy="70" r="3" fill="#34d399" opacity="0.7" class="tiPathFollow12"/>
    <!-- Dashed connections for orbit 3 -->
    <line x1="130" y1="70" x2="70" y2="130" stroke="#059669" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="70" y1="130" x2="130" y2="130" stroke="#059669" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="130" y1="130" x2="70" y2="70" stroke="#059669" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="70" y1="70" x2="130" y2="70" stroke="#059669" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  </g>

  <style>
    .tiBreathing {
      animation: tiBreathing 12s ease-in-out infinite;
    }
    .tiPulseCenter {
      animation: tiPulseCenter 18s ease-in-out infinite;
    }

    /* Path following animations for orbit 1 (diamond shape) */
    .tiPathFollow1 {
      animation: tiPath1 60s linear infinite;
      animation-delay: -30s;
    }
    .tiPathFollow2 {
      animation: tiPath1 60s linear infinite;
      animation-delay: -15s;
    }
    .tiPathFollow3 {
      animation: tiPath1 60s linear infinite;
      animation-delay: -45s;
    }
    .tiPathFollow4 {
      animation: tiPath1 60s linear infinite;
      animation-delay: -0s;
    }

    /* Path following animations for orbit 2 (square shape) */
    .tiPathFollow5 {
      animation: tiPath2 72s linear infinite;
      animation-delay: -36s;
    }
    .tiPathFollow6 {
      animation: tiPath2 72s linear infinite;
      animation-delay: -18s;
    }
    .tiPathFollow7 {
      animation: tiPath2 72s linear infinite;
      animation-delay: -54s;
    }
    .tiPathFollow8 {
      animation: tiPath2 72s linear infinite;
      animation-delay: -0s;
    }

    /* Path following animations for orbit 3 (diamond shape) */
    .tiPathFollow9 {
      animation: tiPath3 84s linear infinite;
      animation-delay: -42s;
    }
    .tiPathFollow10 {
      animation: tiPath3 84s linear infinite;
      animation-delay: -21s;
    }
    .tiPathFollow11 {
      animation: tiPath3 84s linear infinite;
      animation-delay: -63s;
    }
    .tiPathFollow12 {
      animation: tiPath3 84s linear infinite;
      animation-delay: -0s;
    }

    /* Path 1: Diamond shape */
    @keyframes tiPath1 {
      0%, 100% { transform: translate(0px, 0px); }
      25% { transform: translate(50px, 50px); }
      50% { transform: translate(0px, 100px); }
      75% { transform: translate(-50px, 50px); }
    }

    /* Path 2: Square shape */
    @keyframes tiPath2 {
      0%, 100% { transform: translate(0px, 0px); }
      25% { transform: translate(-40px, 40px); }
      50% { transform: translate(0px, 40px); }
      75% { transform: translate(-40px, 0px); }
    }

    /* Path 3: Diamond shape */
    @keyframes tiPath3 {
      0%, 100% { transform: translate(0px, 0px); }
      25% { transform: translate(-60px, 60px); }
      50% { transform: translate(0px, 60px); }
      75% { transform: translate(-60px, 0px); }
    }

    @keyframes tiBreathing {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    @keyframes tiPulseCenter {
      0%, 100% {
        opacity: 0.2;
        transform: scale(0.8);
      }
      50% {
        opacity: 0.4;
        transform: scale(1.2);
      }
    }
  </style>
</svg>