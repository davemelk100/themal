<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chatGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="chatGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Main Chat Interface -->
  <g transform="translate(400, 300)">
    <!-- Central AI Core -->
    <g class="ai-core">
      <circle cx="0" cy="0" r="60" fill="url(#chatGradient1)" opacity="0.7">
        <animate attributeName="r" values="60;65;60" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="40" fill="url(#chatGradient2)" opacity="0.8">
        <animate attributeName="r" values="40;45;40" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Simple Conversation Bubbles -->
    <g class="conversation-bubbles">
      <!-- User Message -->
      <g transform="translate(-180, -120)">
        <rect x="-45" y="-22" width="90" height="44" rx="22" fill="url(#chatGradient1)" opacity="0.6"/>
        <line x1="45" y1="0" x2="60" y2="0" stroke="url(#chatGradient1)" stroke-width="3" opacity="0.6"/>
      </g>
      
      <!-- AI Response -->
      <g transform="translate(180, -90)">
        <rect x="-52" y="-18" width="104" height="36" rx="18" fill="url(#chatGradient2)" opacity="0.7"/>
        <line x1="-52" y1="0" x2="-67" y2="0" stroke="url(#chatGradient2)" stroke-width="3" opacity="0.7"/>
      </g>
    </g>
    
    <!-- Simple Connection Lines -->
    <g class="neural-connections">
      <line x1="0" y1="0" x2="-180" y2="-120" stroke="url(#chatGradient1)" stroke-width="1.5" opacity="0.4"/>
      <line x1="0" y1="0" x2="180" y2="-90" stroke="url(#chatGradient2)" stroke-width="1.5" opacity="0.4"/>
    </g>
    
    <!-- Simple Processing Ring -->
    <g class="processing-rings">
      <circle cx="0" cy="0" r="90" fill="none" stroke="url(#chatGradient1)" stroke-width="1.5" opacity="0.4">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="40s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg> 