<svg width="90" height="90" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 3D Gradients for Depth Effect -->
    <radialGradient id="gradient1" cx="0.4" cy="0.4" r="0.8">
      <stop offset="0%" stop-color="#A67C52" stop-opacity="1"/>
      <stop offset="70%" stop-color="#8B7355" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6B5B47" stop-opacity="0.6"/>
    </radialGradient>
    
    <radialGradient id="gradient2" cx="0.6" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#20B2AA" stop-opacity="1"/>
      <stop offset="70%" stop-color="#1E9BA3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1A8A91" stop-opacity="0.6"/>
    </radialGradient>
    
    <radialGradient id="gradient3" cx="0.3" cy="0.6" r="0.8">
      <stop offset="0%" stop-color="#D2691E" stop-opacity="1"/>
      <stop offset="70%" stop-color="#B85A1A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#A04A16" stop-opacity="0.6"/>
    </radialGradient>
    
    <radialGradient id="gradient4" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0%" stop-color="#8B7355" stop-opacity="1"/>
      <stop offset="70%" stop-color="#7A6B4A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6A5B3F" stop-opacity="0.6"/>
    </radialGradient>
    
    <radialGradient id="highlight" cx="0.3" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    
    <style>
      .layer {
        animation: breathe 120s ease-in-out infinite;
      }
      .layer:nth-child(1) { animation-delay: 0s; }
      .layer:nth-child(2) { animation-delay: -24s; }
      .layer:nth-child(3) { animation-delay: -48s; }
      .layer:nth-child(4) { animation-delay: -72s; }
      .layer:nth-child(5) { animation-delay: -96s; }
      
      .dot {
        animation: pulse 120s ease-in-out infinite;
      }
      .dot:nth-child(1) { animation-delay: 0s; }
      .dot:nth-child(2) { animation-delay: -20s; }
      .dot:nth-child(3) { animation-delay: -40s; }
      .dot:nth-child(4) { animation-delay: -60s; }
      .dot:nth-child(5) { animation-delay: -80s; }
      .dot:nth-child(6) { animation-delay: -100s; }
      

      
      @keyframes breathe {
        0%, 100% { 
          transform: scale(1) rotate(0deg) translateZ(0px);
          opacity: 0.8;
        }
        25% { 
          transform: scale(1.05) rotate(90deg) translateZ(5px);
          opacity: 0.7;
        }
        50% { 
          transform: scale(1.1) rotate(180deg) translateZ(10px);
          opacity: 0.6;
        }
        75% { 
          transform: scale(1.05) rotate(270deg) translateZ(5px);
          opacity: 0.7;
        }
      }
      
      @keyframes pulse {
        0%, 100% { 
          opacity: 0.3;
          transform: scale(0.8);
        }
        50% { 
          opacity: 0.9;
          transform: scale(1.2);
        }
      }
      

    </style>
  </defs>
  
  <!-- 3D Interwoven Space Layers with Depth -->
  <g class="layer">
    <!-- Background Shadow Layer -->
    <circle cx="47" cy="47" r="22" fill="#8B7355" opacity="0.3"/>
    
    <!-- Primary Space Layer - Bottom -->
    <circle cx="45" cy="45" r="20" fill="url(#gradient1)" opacity="0.8"/>
    
    <!-- Secondary Space Layer - Middle -->
    <circle cx="50" cy="40" r="18" fill="url(#gradient2)" opacity="0.7"/>
    
    <!-- Third Space Layer - Top -->
    <circle cx="40" cy="50" r="16" fill="url(#gradient3)" opacity="0.6"/>
    
    <!-- Nested Inner Space - Foreground -->
    <circle cx="45" cy="45" r="8" fill="url(#gradient4)" opacity="0.9"/>
    
    <!-- 3D Highlight Effects -->
    <circle cx="42" cy="42" r="6" fill="url(#highlight)" opacity="0.4"/>
  </g>
  

  
  <!-- Mid-Century Modern Corner Elements - Muted Orange and Teal -->
  <rect class="dot" x="18" y="18" width="6" height="6" rx="1" fill="#D2691E"/>
  <rect class="dot" x="66" y="18" width="6" height="6" rx="1" fill="#20B2AA"/>
  <rect class="dot" x="18" y="66" width="6" height="6" rx="1" fill="#CD853F"/>
  <rect class="dot" x="66" y="66" width="6" height="6" rx="1" fill="#48D1CC"/>
  
  <!-- Mid-Century Modern Center Accents -->
  <circle class="dot" cx="45" cy="15" r="3" fill="#8B7355"/>
  <circle class="dot" cx="45" cy="75" r="3" fill="#A67C52"/>
  
  <!-- 3D Interwoven Connection Points -->
  <circle cx="48" cy="42" r="2.5" fill="url(#gradient1)" opacity="0.9" class="dot"/>
  <circle cx="42" cy="48" r="2.5" fill="url(#gradient2)" opacity="0.9" class="dot"/>
  <circle cx="52" cy="38" r="2.5" fill="url(#gradient3)" opacity="0.9" class="dot"/>
  <circle cx="38" cy="52" r="2.5" fill="url(#gradient4)" opacity="0.9" class="dot"/>
  

  
  <!-- AI Interface Elements at Intersection Points -->
  <rect x="35" y="25" width="4" height="4" rx="0.5" fill="#C4A484" opacity="0.6" class="dot"/>
  <rect x="51" y="25" width="4" height="4" rx="0.5" fill="#D2B48C" opacity="0.6" class="dot"/>
  <rect x="35" y="61" width="4" height="4" rx="0.5" fill="#A67C52" opacity="0.6" class="dot"/>
  <rect x="51" y="61" width="4" height="4" rx="0.5" fill="#8B7355" opacity="0.6" class="dot"/>
</svg> 