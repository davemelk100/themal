<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fractalGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="fractalGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Main Structure -->
  <g transform="translate(300, 225)">
    <!-- Simple Rotating Rings -->
    <g class="primary-fractal">
      <!-- Outer Ring -->
      <circle cx="0" cy="0" r="120" fill="none" stroke="url(#fractalGradient1)" stroke-width="3" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="20s" repeatCount="indefinite"/>
      </circle>
      
      <!-- Inner Ring -->
      <circle cx="0" cy="0" r="90" fill="none" stroke="url(#fractalGradient2)" stroke-width="2" opacity="0.7">
        <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="15s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Core Center -->
    <circle cx="0" cy="0" r="22" fill="url(#fractalGradient1)" opacity="0.9">
      <animate attributeName="r" values="22;25;22" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="12" fill="url(#fractalGradient2)" opacity="1"/>
  </g>
</svg> 