<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="designGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="designGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.6" />
    </linearGradient>
    <style>
      .fractal-square {
        transform-origin: 45px 45px;
      }
      
      .primary-rotate {
        animation: primaryRotate 60s linear infinite;
      }
      
      .secondary-rotate {
        animation: secondaryRotate 48s linear infinite reverse;
      }
      
      .tertiary-rotate {
        animation: tertiaryRotate 72s linear infinite;
      }
      
      .quaternary-rotate {
        animation: quaternaryRotate 84s linear infinite reverse;
      }
      
      .quinary-rotate {
        animation: quinaryRotate 96s linear infinite;
      }
      
      .senary-rotate {
        animation: senaryRotate 108s linear infinite reverse;
      }
      
      .septenary-rotate {
        animation: septenaryRotate 120s linear infinite;
      }
      
      .octonary-rotate {
        animation: octonaryRotate 132s linear infinite reverse;
      }
      
      .nonary-rotate {
        animation: nonaryRotate 144s linear infinite;
      }
      
      .denary-rotate {
        animation: denaryRotate 156s linear infinite reverse;
      }
      
      .floating {
        animation: float 48s ease-in-out infinite;
      }
      
      .floating:nth-child(2) {
        animation-delay: 12s;
      }
      
      .floating:nth-child(3) {
        animation-delay: 24s;
      }
      
      .pulse {
        animation: pulse 40s ease-in-out infinite;
      }
      
      .pulse:nth-child(2) {
        animation-delay: 10s;
      }
      
      .pulse:nth-child(3) {
        animation-delay: 20s;
      }
      
      .breathing {
        animation: breathing 60s ease-in-out infinite;
      }
      
      .glow {
        animation: glow 32s ease-in-out infinite;
      }
      
      @keyframes primaryRotate {
        0% {
          transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(1);
        }
        50% {
          transform: perspective(200px) rotateY(180deg) rotateX(180deg) scale(1.1);
        }
        100% {
          transform: perspective(200px) rotateY(360deg) rotateX(360deg) scale(1);
        }
      }
      
      @keyframes secondaryRotate {
        0% {
          transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(1.1);
        }
        50% {
          transform: perspective(200px) rotateY(-180deg) rotateX(-180deg) scale(0.9);
        }
        100% {
          transform: perspective(200px) rotateY(-360deg) rotateX(-360deg) scale(1.1);
        }
      }
      
      @keyframes tertiaryRotate {
        0% {
          transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(0.9);
        }
        50% {
          transform: perspective(200px) rotateY(180deg) rotateX(180deg) scale(1.2);
        }
        100% {
          transform: perspective(200px) rotateY(360deg) rotateX(360deg) scale(0.9);
        }
      }
      
      @keyframes quaternaryRotate {
        0% {
          transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(1.2);
        }
        50% {
          transform: perspective(200px) rotateY(-180deg) rotateX(-180deg) scale(0.8);
        }
        100% {
          transform: perspective(200px) rotateY(-360deg) rotateX(-360deg) scale(1.2);
        }
      }
      
      @keyframes quinaryRotate {
        0% {
          transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(0.8);
        }
        50% {
          transform: perspective(200px) rotateY(180deg) rotateX(180deg) scale(1.3);
        }
        100% {
          transform: perspective(200px) rotateY(360deg) rotateX(360deg) scale(0.8);
        }
      }
      
      @keyframes senaryRotate {
        0% {
          transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(1.3);
        }
        50% {
          transform: perspective(200px) rotateY(-180deg) rotateX(-180deg) scale(0.7);
        }
        100% {
          transform: perspective(200px) rotateY(-360deg) rotateX(-360deg) scale(1.3);
        }
      }
      
      @keyframes septenaryRotate {
        0% {
          transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(0.6);
        }
        50% {
          transform: perspective(200px) rotateY(180deg) rotateX(180deg) scale(1.4);
        }
        100% {
          transform: perspective(200px) rotateY(360deg) rotateX(360deg) scale(0.6);
        }
      }
      
      @keyframes octonaryRotate {
        0% {
          transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(1.4);
        }
        50% {
          transform: perspective(200px) rotateY(-180deg) rotateX(-180deg) scale(0.5);
        }
        100% {
          transform: perspective(200px) rotateY(-360deg) rotateX(-360deg) scale(1.4);
        }
      }
      
      @keyframes nonaryRotate {
        0% {
          transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(0.5);
        }
        50% {
          transform: perspective(200px) rotateY(180deg) rotateX(180deg) scale(1.5);
        }
        100% {
          transform: perspective(200px) rotateY(360deg) rotateX(360deg) scale(0.5);
        }
      }
      
      @keyframes denaryRotate {
        0% {
          transform: perspective(200px) rotateY(0deg) rotateX(0deg) scale(1.5);
        }
        50% {
          transform: perspective(200px) rotateY(-180deg) rotateX(-180deg) scale(0.4);
        }
        100% {
          transform: perspective(200px) rotateY(-360deg) rotateX(-360deg) scale(1.5);
        }
      }
      
      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
          opacity: 0.4;
        }
        50% {
          transform: translateY(-6px);
          opacity: 0.8;
        }
      }
      
      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.3;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.7;
        }
      }
      
      @keyframes breathing {
        0%, 100% {
          transform: scale(1);
          opacity: 0.2;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.6;
        }
      }
      
      @keyframes glow {
        0%, 100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.8;
        }
      }
    </style>
  </defs>
  
  <!-- Central Core Triangle -->
  <polygon points="45,42 47,46 43,46" fill="url(#designGradient1)" opacity="0.5" class="fractal-square primary-rotate"/>
  
  <!-- First Layer of Rotating Triangles -->
  <g class="fractal-square secondary-rotate">
    <polygon points="30.5,28 32.5,32 28.5,32" fill="#0d9488" opacity="0.4" class="floating"/>
    <polygon points="59.5,28 61.5,32 57.5,32" fill="#f97316" opacity="0.4" class="floating"/>
    <polygon points="59.5,57 61.5,61 57.5,61" fill="#0d9488" opacity="0.4" class="floating"/>
    <polygon points="30.5,57 32.5,61 28.5,61" fill="#f97316" opacity="0.4" class="floating"/>
  </g>
  
  <!-- Second Layer of Rotating Triangles -->
  <g class="fractal-square tertiary-rotate">
    <polygon points="20,18 22,22 18,22" fill="#f97316" opacity="0.3" class="pulse"/>
    <polygon points="70,18 72,22 68,22" fill="#0d9488" opacity="0.3" class="pulse"/>
    <polygon points="70,68 72,72 68,72" fill="#f97316" opacity="0.3" class="pulse"/>
    <polygon points="20,68 22,72 18,72" fill="#0d9488" opacity="0.3" class="pulse"/>
  </g>
  
  <!-- Third Layer of Rotating Triangles -->
  <g class="fractal-square quaternary-rotate">
    <polygon points="13.5,12 15,14 12,14" fill="#0d9488" opacity="0.25" class="floating"/>
    <polygon points="76.5,12 78,14 75,14" fill="#f97316" opacity="0.25" class="floating"/>
    <polygon points="76.5,75 78,77 75,77" fill="#0d9488" opacity="0.25" class="floating"/>
    <polygon points="13.5,75 15,77 12,77" fill="#f97316" opacity="0.25" class="floating"/>
  </g>
  
  <!-- Fourth Layer of Rotating Triangles -->
  <g class="fractal-square quinary-rotate">
    <polygon points="8,7 9,9 7,9" fill="#f97316" opacity="0.2" class="pulse"/>
    <polygon points="82,7 83,9 81,9" fill="#0d9488" opacity="0.2" class="pulse"/>
    <polygon points="82,81 83,83 81,83" fill="#f97316" opacity="0.2" class="pulse"/>
    <polygon points="8,81 9,83 7,83" fill="#0d9488" opacity="0.2" class="pulse"/>
  </g>
  
  <!-- Fifth Layer of Rotating Triangles -->
  <g class="fractal-square senary-rotate">
    <polygon points="3.5,3 4,4 3,4" fill="#0d9488" opacity="0.15" class="breathing"/>
    <polygon points="86.5,3 87,4 86,4" fill="#f97316" opacity="0.15" class="breathing"/>
    <polygon points="86.5,86 87,87 86,87" fill="#0d9488" opacity="0.15" class="breathing"/>
    <polygon points="3.5,86 4,87 3,87" fill="#f97316" opacity="0.15" class="breathing"/>
  </g>
  
  <!-- Sixth Layer of Rotating Triangles -->
  <g class="fractal-square septenary-rotate">
    <polygon points="1.5,1 2,2 1,2" fill="#f97316" opacity="0.12" class="floating"/>
    <polygon points="88.5,1 89,2 88,2" fill="#0d9488" opacity="0.12" class="floating"/>
    <polygon points="88.5,88 89,89 88,89" fill="#f97316" opacity="0.12" class="floating"/>
    <polygon points="1.5,88 2,89 1,89" fill="#0d9488" opacity="0.12" class="floating"/>
  </g>
  
  <!-- Seventh Layer of Rotating Triangles -->
  <g class="fractal-square octonary-rotate">
    <polygon points="0.75,0.5 1,1 0.5,1" fill="#0d9488" opacity="0.1" class="pulse"/>
    <polygon points="89.25,0.5 89.5,1 89,1" fill="#f97316" opacity="0.1" class="pulse"/>
    <polygon points="89.25,89 89.5,89.5 89,89.5" fill="#0d9488" opacity="0.1" class="pulse"/>
    <polygon points="0.75,89 1,89.5 0.5,89.5" fill="#f97316" opacity="0.1" class="pulse"/>
  </g>
  
  <!-- Eighth Layer of Rotating Triangles -->
  <g class="fractal-square nonary-rotate">
    <polygon points="0.375,0.25 0.5,0.5 0.25,0.5" fill="#f97316" opacity="0.08" class="breathing"/>
    <polygon points="89.625,0.25 89.75,0.5 89.5,0.5" fill="#0d9488" opacity="0.08" class="breathing"/>
    <polygon points="89.625,89.5 89.75,89.75 89.5,89.75" fill="#f97316" opacity="0.08" class="breathing"/>
    <polygon points="0.375,89.5 0.5,89.75 0.25,89.75" fill="#0d9488" opacity="0.08" class="breathing"/>
  </g>
  
  <!-- Ninth Layer of Rotating Triangles -->
  <g class="fractal-square denary-rotate">
    <polygon points="0.1875,0.125 0.25,0.25 0.125,0.25" fill="#0d9488" opacity="0.06" class="floating"/>
    <polygon points="89.8125,0.125 89.875,0.25 89.75,0.25" fill="#f97316" opacity="0.06" class="floating"/>
    <polygon points="89.8125,89.75 89.875,89.875 89.75,89.875" fill="#0d9488" opacity="0.06" class="floating"/>
    <polygon points="0.1875,89.75 0.25,89.875 0.125,89.875" fill="#f97316" opacity="0.06" class="floating"/>
  </g>
  
  <!-- Tenth Layer of Rotating Triangles -->
  <g class="fractal-square primary-rotate">
    <polygon points="0.09375,0.0625 0.125,0.125 0.0625,0.125" fill="#f97316" opacity="0.05" class="pulse"/>
    <polygon points="89.90625,0.0625 89.9375,0.125 89.875,0.125" fill="#0d9488" opacity="0.05" class="pulse"/>
    <polygon points="89.90625,89.875 89.9375,89.9375 89.875,89.9375" fill="#f97316" opacity="0.05" class="pulse"/>
    <polygon points="0.09375,89.875 0.125,89.9375 0.0625,89.9375" fill="#0d9488" opacity="0.05" class="pulse"/>
  </g>
  
  <!-- Additional Triangles - Eleventh Layer -->
  <g class="fractal-square secondary-rotate">
    <polygon points="0.046875,0.03125 0.0625,0.0625 0.03125,0.0625" fill="url(#designGradient1)" opacity="0.04" class="glow"/>
    <polygon points="89.953125,0.03125 89.96875,0.0625 89.9375,0.0625" fill="url(#designGradient2)" opacity="0.04" class="glow"/>
    <polygon points="89.953125,89.9375 89.96875,89.96875 89.9375,89.96875" fill="url(#designGradient1)" opacity="0.04" class="glow"/>
    <polygon points="0.046875,89.9375 0.0625,89.96875 0.03125,89.96875" fill="url(#designGradient2)" opacity="0.04" class="glow"/>
  </g>
  
  <!-- Additional Triangles - Twelfth Layer -->
  <g class="fractal-square tertiary-rotate">
    <polygon points="0.0234375,0.015625 0.03125,0.03125 0.015625,0.03125" fill="#f97316" opacity="0.03" class="breathing"/>
    <polygon points="89.9765625,0.015625 89.984375,0.03125 89.96875,0.03125" fill="#0d9488" opacity="0.03" class="breathing"/>
    <polygon points="89.9765625,89.96875 89.984375,89.984375 89.96875,89.984375" fill="#f97316" opacity="0.03" class="breathing"/>
    <polygon points="0.0234375,89.96875 0.03125,89.984375 0.015625,89.984375" fill="#0d9488" opacity="0.03" class="breathing"/>
  </g>
  

  
  <!-- Glowing Center Point -->
  <polygon points="45,42 47,47 43,47" fill="url(#designGradient1)" opacity="0.7" class="pulse"/>
  <polygon points="45,40 48,46 42,46" fill="url(#designGradient2)" opacity="0.2" class="pulse"/>
  <polygon points="45,38 49,45 41,45" fill="url(#designGradient1)" opacity="0.1" class="breathing"/>
  
  <!-- Additional Glow Rings -->
  <polygon points="45,36 50,44 40,44" fill="url(#designGradient2)" opacity="0.08" class="glow"/>
  <polygon points="45,34 51,43 39,43" fill="url(#designGradient1)" opacity="0.05" class="breathing"/>
  
  <!-- Subtle Raised Effect Below Center -->
  <ellipse cx="45" cy="52" rx="4" ry="1.5" fill="#f5f5f5" opacity="0.3" class="breathing"/>
  <ellipse cx="45" cy="53" rx="3" ry="1" fill="#f5f5f5" opacity="0.2" class="breathing"/>
</svg> 