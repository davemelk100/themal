<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .scale-group {
        transform-origin: 45px 45px;
      }
      
      .micro-scale {
        animation: microPulse 32s ease-in-out infinite;
      }
      
      .macro-scale {
        animation: macroPulse 40s ease-in-out infinite;
      }
      
      .nested-scale {
        animation: nestedScale 48s ease-in-out infinite;
      }
      
      @keyframes microPulse {
        0%, 100% {
          transform: scale(0.3);
          opacity: 0.3;
        }
        50% {
          transform: scale(0.8);
          opacity: 0.7;
        }
      }
      
      @keyframes macroPulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.4;
        }
        50% {
          transform: scale(1.5);
          opacity: 0.8;
        }
      }
      
      @keyframes nestedScale {
        0%, 100% {
          transform: scale(0.5);
          opacity: 0.4;
        }
        33% {
          transform: scale(1.2);
          opacity: 0.6;
        }
        66% {
          transform: scale(0.7);
          opacity: 0.5;
        }
      }
      
      .floating-scale {
        animation: floatScale 60s ease-in-out infinite;
      }
      
      .floating-scale:nth-child(2) {
        animation-delay: 16s;
      }
      
      .floating-scale:nth-child(3) {
        animation-delay: 32s;
      }
      
      @keyframes floatScale {
        0%, 100% {
          transform: translateY(0px) scale(0.6);
          opacity: 0.3;
        }
        25% {
          transform: translateY(-5px) scale(1.2);
          opacity: 0.6;
        }
        50% {
          transform: translateY(-10px) scale(0.8);
          opacity: 0.4;
        }
        75% {
          transform: translateY(-5px) scale(1.4);
          opacity: 0.7;
        }
      }
      
      .perspective-shift {
        animation: perspectiveShift 72s ease-in-out infinite;
      }
      
      @keyframes perspectiveShift {
        0%, 100% {
          transform: scale(0.4) translateY(0px);
          opacity: 0.2;
        }
        25% {
          transform: scale(1.8) translateY(-8px);
          opacity: 0.5;
        }
        50% {
          transform: scale(0.6) translateY(-15px);
          opacity: 0.3;
        }
        75% {
          transform: scale(2.2) translateY(-5px);
          opacity: 0.6;
        }
      }
    </style>
  </defs>
  
  <!-- Background Grid (Multiple Scales) -->
  <line x1="10" y1="80" x2="80" y2="80" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1"/>
  <line x1="10" y1="60" x2="80" y2="60" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1"/>
  <line x1="10" y1="40" x2="80" y2="40" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1"/>
  <line x1="10" y1="20" x2="80" y2="20" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1"/>
  
  <line x1="10" y1="20" x2="10" y2="80" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1"/>
  <line x1="30" y1="20" x2="30" y2="80" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1"/>
  <line x1="50" y1="20" x2="50" y2="80" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1"/>
  <line x1="70" y1="20" x2="70" y2="80" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1"/>
  
  <!-- Micro Scale Elements (Could be details or entire objects) -->
  <g class="scale-group">
    <circle cx="25" cy="25" r="4" fill="#4A5568" class="micro-scale"/>
    <circle cx="65" cy="25" r="4" fill="#718096" class="micro-scale"/>
    <circle cx="65" cy="65" r="4" fill="#A0AEC0" class="micro-scale"/>
    <circle cx="25" cy="65" r="4" fill="#CBD5E0" class="micro-scale"/>
  </g>
  

  
  <!-- Nested Scale Elements (Multiple interpretations) -->
  <g class="scale-group">
    <circle cx="45" cy="45" r="6" fill="#A0AEC0" class="nested-scale"/>
    <circle cx="45" cy="45" r="3" fill="#CBD5E0" opacity="0.8"/>
  </g>
  
  <!-- Floating Scale Elements (Ambiguous size) -->
  <g class="scale-group">
    <polygon points="15,40 20,35 25,40 20,45" fill="#718096" class="floating-scale"/>
    <polygon points="55,15 60,10 65,15 60,20" fill="#A0AEC0" class="floating-scale"/>
    <polygon points="55,70 60,65 65,70 60,75" fill="#CBD5E0" class="floating-scale"/>
  </g>
  
  <!-- Perspective Shift Element (Most ambiguous) -->
  <g class="scale-group">
    <rect x="40" y="50" width="10" height="10" rx="2" fill="#4A5568" class="perspective-shift"/>
    <rect x="42" y="52" width="6" height="6" rx="1" fill="#718096" opacity="0.7"/>
  </g>
  
  <!-- Scale Reference Lines (Show relationships) -->
  <line x1="45" y1="45" x2="25" y2="25" stroke="#A0AEC0" stroke-width="0.3" opacity="0.2"/>
  <line x1="45" y1="45" x2="65" y2="25" stroke="#A0AEC0" stroke-width="0.3" opacity="0.2"/>
  <line x1="45" y1="45" x2="65" y2="65" stroke="#A0AEC0" stroke-width="0.3" opacity="0.2"/>
  <line x1="45" y1="45" x2="25" y2="65" stroke="#A0AEC0" stroke-width="0.3" opacity="0.2"/>
</svg> 