<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Set theme class immediately to prevent flash and forced reflow -->
    <script>
      (function () {
        if (typeof window === "undefined") return;
        try {
          const theme = localStorage.getItem("theme");
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {
          // localStorage might not be available
        }
      })();
    </script>
    <title>Theemal | Real-Time Theming</title>
    <meta name="email" content="davemelk@gmail.com" />
    <meta
      name="description"
      content="Digital Experience Designer with over 15 years of experience creating user-centered solutions"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://davemelkonian.com/" />
    <meta property="og:title" content="Dave Melkonian | Digital Design" />
    <meta
      property="og:description"
      content="Digital Experience Designer with over 15 years of experience creating user-centered solutions"
    />
    <meta
      property="og:image"
      content="https://davemelkonian.com/img/og-logo.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Dave Melkonian - Digital Experience Designer"
    />
    <meta property="og:site_name" content="Dave Melkonian" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://davemelkonian.com/" />
    <meta name="twitter:title" content="Dave Melkonian | Digital Design" />
    <meta
      name="twitter:description"
      content="Digital Experience Designer with over 15 years of experience creating user-centered solutions"
    />
    <meta
      name="twitter:image"
      content="https://davemelkonian.com/img/og-logo.png"
    />
    <meta
      name="twitter:image:alt"
      content="Dave Melkonian - Digital Experience Designer"
    />

    <!-- Additional SEO -->
    <meta name="author" content="Dave Melkonian" />
    <meta
      name="keywords"
      content="Digital Design, UX Design, UI Design, Experience Design, Product Design, Portfolio"
    />
    <link rel="canonical" href="https://davemelkonian.com/" />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />

    <!-- Load Roboto eagerly — primary font, prevents CLS from font swap -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family:
          "Roboto",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Arial",
          sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Minimal loading skeleton for faster FCP -->
      <div
        style="
          min-height: 100vh;
          background: white;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <div style="text-align: center">
          <div
            style="
              width: 48px;
              height: 48px;
              border: 3px solid #f3f3f3;
              border-top: 3px solid #333;
              border-radius: 50%;
              animation: spin 1s linear infinite;
              margin: 0 auto 16px;
            "
          ></div>
          <p
            style="
              color: #666;
              font-family:
                -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Arial,
                sans-serif;
            "
          >
            Loading...
          </p>
        </div>
      </div>
      <style>
        @keyframes spin {
          0% {
            transform: rotate(0deg);
          }
          100% {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
