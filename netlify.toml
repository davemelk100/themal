[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[context.branch-deploy]
  command = "npm run build"

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200