[build]
command = "npm run build"
publish = "dist"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]] 
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
X-Content-Type-Options = "nosniff"

[[headers]]
for = "/img/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/video/*"
[headers.values]
Content-Type = "video/mp4"
Accept-Ranges = "bytes"
Cache-Control = "public, max-age=31536000, immutable"
Access-Control-Allow-Origin = "*"

[[headers]]
for = "/*.mp4"
[headers.values]
Content-Type = "video/mp4"
Accept-Ranges = "bytes"
Cache-Control = "public, max-age=31536000, immutable"
Access-Control-Allow-Origin = "*"
