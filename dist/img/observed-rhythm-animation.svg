<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wave-element {
        fill: #ff6b6b;
        fill-opacity: 0.8;
        stroke: none;
      }
      
      @keyframes waveFlow {
        0% {
          transform: translateX(-5px) scaleY(0.9);
        }
        50% {
          transform: translateX(5px) scaleY(1.1);
        }
        100% {
          transform: translateX(-5px) scaleY(0.9);
        }
      }
      
      .pulse-dot {
        animation: pulse 20s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% {
          opacity: 0.4;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
      }
    </style>
  </defs>
  
  <!-- Simple Rhythm Wave -->
  <g style="animation: waveFlow 60s ease-in-out infinite;">
    <path d="M10,70 Q30,60 50,70 Q70,80 80,70" class="wave-element" stroke-width="2">
      <animate attributeName="d" 
        values="M10,70 Q30,60 50,70 Q70,80 80,70;M10,75 Q30,65 50,75 Q70,85 80,75;M10,70 Q30,60 50,70 Q70,80 80,70" 
        dur="60s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Single Rhythm Pulse Dot -->
  <circle cx="45" cy="40" r="4" class="wave-element pulse-dot"/>
  
  <!-- Simple bottom indicator -->
  <rect x="20" y="85" width="50" height="1" fill="#ff6b6b" opacity="0.6">
    <animate attributeName="width" values="0;50;0" dur="60s" repeatCount="indefinite"/>
  </rect>
</svg> 