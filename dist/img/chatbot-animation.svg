<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chatGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="chatGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Chat Interface -->
  <g transform="translate(300, 225)">
    <!-- Central AI Core -->
    <g class="ai-core">
      <circle cx="0" cy="0" r="40" fill="url(#chatGradient1)" opacity="0.7">
        <animate attributeName="r" values="40;45;40" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.9;0.7" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="25" fill="url(#chatGradient2)" opacity="0.8">
        <animate attributeName="r" values="25;30;25" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="15" fill="url(#chatGradient1)" opacity="0.9">
        <animate attributeName="r" values="15;18;15" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Conversation Bubbles -->
    <g class="conversation-bubbles">
      <!-- User Message 1 -->
      <g transform="translate(-120, -80)">
        <rect x="-30" y="-15" width="60" height="30" rx="15" fill="url(#chatGradient1)" opacity="0.6">
          <animate attributeName="opacity" values="0.6;0.8;0.6" dur="3s" repeatCount="indefinite"/>
        </rect>
        <line x1="30" y1="0" x2="40" y2="0" stroke="url(#chatGradient1)" stroke-width="2" opacity="0.6"/>
        <circle cx="0" cy="0" r="3" fill="#f97316" opacity="0.8">
          <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
        </circle>
      </g>
      
      <!-- AI Response 1 -->
      <g transform="translate(120, -60)">
        <rect x="-35" y="-12" width="70" height="24" rx="12" fill="url(#chatGradient2)" opacity="0.7">
          <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3.5s" repeatCount="indefinite"/>
        </rect>
        <line x1="-35" y1="0" x2="-45" y2="0" stroke="url(#chatGradient2)" stroke-width="2" opacity="0.7"/>
        <circle cx="0" cy="0" r="4" fill="#0d9488" opacity="0.8">
          <animate attributeName="r" values="4;5;4" dur="2.5s" repeatCount="indefinite"/>
        </circle>
      </g>
      
      <!-- User Message 2 -->
      <g transform="translate(-100, 20)">
        <rect x="-25" y="-10" width="50" height="20" rx="10" fill="url(#chatGradient1)" opacity="0.5">
          <animate attributeName="opacity" values="0.5;0.7;0.5" dur="4s" repeatCount="indefinite"/>
        </rect>
        <line x1="25" y1="0" x2="35" y2="0" stroke="url(#chatGradient1)" stroke-width="1.5" opacity="0.5"/>
        <circle cx="0" cy="0" r="2" fill="#f97316" opacity="0.7">
          <animate attributeName="r" values="2;3;2" dur="1.5s" repeatCount="indefinite"/>
        </circle>
      </g>
      
      <!-- AI Response 2 -->
      <g transform="translate(100, 40)">
        <rect x="-30" y="-8" width="60" height="16" rx="8" fill="url(#chatGradient2)" opacity="0.6">
          <animate attributeName="opacity" values="0.6;0.8;0.6" dur="3.8s" repeatCount="indefinite"/>
        </rect>
        <line x1="-30" y1="0" x2="-40" y2="0" stroke="url(#chatGradient2)" stroke-width="1.5" opacity="0.6"/>
        <circle cx="0" cy="0" r="3" fill="#0d9488" opacity="0.7">
          <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
    
    <!-- Neural Network Connections -->
    <g class="neural-connections">
      <!-- Connection Lines -->
      <line x1="0" y1="0" x2="-120" y2="-80" stroke="url(#chatGradient1)" stroke-width="1" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.6;0.4" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="0" x2="120" y2="-60" stroke="url(#chatGradient2)" stroke-width="1" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.6;0.4" dur="2.5s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="0" x2="-100" y2="20" stroke="url(#chatGradient1)" stroke-width="1" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="0" x2="100" y2="40" stroke="url(#chatGradient2)" stroke-width="1" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3.5s" repeatCount="indefinite"/>
      </line>
    </g>
    
    <!-- Data Processing Nodes -->
    <g class="data-nodes">
      <!-- Top Left Node -->
      <g transform="translate(-80, -120)">
        <circle cx="0" cy="0" r="8" fill="url(#chatGradient1)" opacity="0.6">
          <animate attributeName="r" values="8;10;8" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="4" fill="url(#chatGradient2)" opacity="0.8">
          <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
        </circle>
      </g>
      
      <!-- Top Right Node -->
      <g transform="translate(80, -120)">
        <circle cx="0" cy="0" r="8" fill="url(#chatGradient2)" opacity="0.6">
          <animate attributeName="r" values="8;10;8" dur="3.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="4" fill="url(#chatGradient1)" opacity="0.8">
          <animate attributeName="r" values="4;5;4" dur="2.5s" repeatCount="indefinite"/>
        </circle>
      </g>
      
      <!-- Bottom Left Node -->
      <g transform="translate(-80, 120)">
        <circle cx="0" cy="0" r="8" fill="url(#chatGradient2)" opacity="0.6">
          <animate attributeName="r" values="8;10;8" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="4" fill="url(#chatGradient1)" opacity="0.8">
          <animate attributeName="r" values="4;5;4" dur="3s" repeatCount="indefinite"/>
        </circle>
      </g>
      
      <!-- Bottom Right Node -->
      <g transform="translate(80, 120)">
        <circle cx="0" cy="0" r="8" fill="url(#chatGradient1)" opacity="0.6">
          <animate attributeName="r" values="8;10;8" dur="3.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="4" fill="url(#chatGradient2)" opacity="0.8">
          <animate attributeName="r" values="4;5;4" dur="2.8s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
    
    <!-- Floating Data Particles -->
    <g class="data-particles">
      <circle cx="0" cy="0" r="2" fill="#f97316" opacity="0.7" filter="url(#glow)">
        <animate attributeName="cx" values="0;50;0;-50;0" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="0;-50;0;50;0" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="1.5" fill="#0d9488" opacity="0.6" filter="url(#glow)">
        <animate attributeName="cx" values="0;-40;0;40;0" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="0;40;0;-40;0" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="1" fill="#f97316" opacity="0.5" filter="url(#glow)">
        <animate attributeName="cx" values="0;60;0;-60;0" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="0;-60;0;60;0" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.8;0.5" dur="5s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Processing Rings -->
    <g class="processing-rings">
      <circle cx="0" cy="0" r="60" fill="none" stroke="url(#chatGradient1)" stroke-width="1" opacity="0.4">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="20s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="80" fill="none" stroke="url(#chatGradient2)" stroke-width="1" opacity="0.3">
        <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="25s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="100" fill="none" stroke="url(#chatGradient1)" stroke-width="1" opacity="0.2">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="30s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <!-- Ambient Interface Glow -->
  <circle cx="300" cy="225" r="150" fill="none" stroke="url(#chatGradient1)" stroke-width="1" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg> 