<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="axonometricGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="axonometricGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.6" />
    </linearGradient>
    <style>
      .axonometric-container {
        transform-origin: 45px 45px;
        perspective: 800px;
      }
      
      .cube-rotate {
        animation: cubeRotate 120s linear infinite;
      }
      
      .cube-rotate-reverse {
        animation: cubeRotate 120s linear infinite reverse;
      }
      
      .pyramid-rotate {
        animation: pyramidRotate 90s linear infinite;
      }
      
      .pyramid-rotate-reverse {
        animation: pyramidRotate 90s linear infinite reverse;
      }
      
      .sphere-rotate {
        animation: sphereRotate 150s linear infinite;
      }
      
      .sphere-rotate-reverse {
        animation: sphereRotate 150s linear infinite reverse;
      }
      
      .cylinder-rotate {
        animation: cylinderRotate 180s linear infinite;
      }
      
      .cylinder-rotate-reverse {
        animation: cylinderRotate 180s linear infinite reverse;
      }
      
      .floating {
        animation: float 60s ease-in-out infinite;
      }
      
      .pulse {
        animation: pulse 40s ease-in-out infinite;
      }
      
      .breathing {
        animation: breathing 80s ease-in-out infinite;
      }
      
      .glow {
        animation: glow 50s ease-in-out infinite;
      }
      
      @keyframes cubeRotate {
        0% {
          transform: perspective(800px) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1);
        }
        25% {
          transform: perspective(800px) rotateX(90deg) rotateY(90deg) rotateZ(45deg) scale(1.1);
        }
        50% {
          transform: perspective(800px) rotateX(180deg) rotateY(180deg) rotateZ(90deg) scale(1);
        }
        75% {
          transform: perspective(800px) rotateX(270deg) rotateY(270deg) rotateZ(135deg) scale(1.1);
        }
        100% {
          transform: perspective(800px) rotateX(360deg) rotateY(360deg) rotateZ(180deg) scale(1);
        }
      }
      
      @keyframes pyramidRotate {
        0% {
          transform: perspective(800px) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1);
        }
        33% {
          transform: perspective(800px) rotateX(120deg) rotateY(120deg) rotateZ(60deg) scale(1.2);
        }
        66% {
          transform: perspective(800px) rotateX(240deg) rotateY(240deg) rotateZ(120deg) scale(1);
        }
        100% {
          transform: perspective(800px) rotateX(360deg) rotateY(360deg) rotateZ(180deg) scale(1.2);
        }
      }
      
      @keyframes sphereRotate {
        0% {
          transform: perspective(800px) rotateX(0deg) rotateY(0deg) scale(1);
        }
        50% {
          transform: perspective(800px) rotateX(180deg) rotateY(180deg) scale(1.3);
        }
        100% {
          transform: perspective(800px) rotateX(360deg) rotateY(360deg) scale(1);
        }
      }
      
      @keyframes cylinderRotate {
        0% {
          transform: perspective(800px) rotateX(0deg) rotateZ(0deg) scale(1);
        }
        25% {
          transform: perspective(800px) rotateX(90deg) rotateZ(90deg) scale(1.1);
        }
        50% {
          transform: perspective(800px) rotateX(180deg) rotateZ(180deg) scale(1);
        }
        75% {
          transform: perspective(800px) rotateX(270deg) rotateZ(270deg) scale(1.1);
        }
        100% {
          transform: perspective(800px) rotateX(360deg) rotateZ(360deg) scale(1);
        }
      }
      
      @keyframes float {
        0%, 100% {
          transform: translateY(0px) translateZ(0px);
          opacity: 0.6;
        }
        50% {
          transform: translateY(-8px) translateZ(20px);
          opacity: 1;
        }
      }
      
      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.4;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.8;
        }
      }
      
      @keyframes breathing {
        0%, 100% {
          transform: scale(1);
          opacity: 0.3;
        }
        50% {
          transform: scale(1.4);
          opacity: 0.7;
        }
      }
      
      @keyframes glow {
        0%, 100% {
          opacity: 0.2;
        }
        50% {
          opacity: 0.9;
        }
      }
    </style>
  </defs>
  
  <!-- Central Cube -->
  <g class="axonometric-container cube-rotate">
    <!-- Front face -->
    <polygon points="35,35 55,35 55,55 35,55" fill="url(#axonometricGradient1)" opacity="0.8" class="pulse"/>
    <!-- Top face -->
    <polygon points="35,35 55,35 50,25 30,25" fill="url(#axonometricGradient2)" opacity="0.6" class="floating"/>
    <!-- Right face -->
    <polygon points="55,35 55,55 50,45 50,25" fill="#f97316" opacity="0.5" class="breathing"/>
  </g>
  
  <!-- Rotating Pyramid -->
  <g class="axonometric-container pyramid-rotate-reverse">
    <polygon points="45,20 60,40 30,40" fill="url(#axonometricGradient1)" opacity="0.7" class="floating"/>
    <polygon points="45,20 60,40 45,50" fill="url(#axonometricGradient2)" opacity="0.5" class="pulse"/>
    <polygon points="45,20 30,40 45,50" fill="#0d9488" opacity="0.4" class="breathing"/>
  </g>
  
  <!-- Floating Sphere -->
  <g class="axonometric-container sphere-rotate">
    <circle cx="25" cy="25" r="8" fill="url(#axonometricGradient1)" opacity="0.6" class="floating"/>
    <circle cx="25" cy="25" r="6" fill="url(#axonometricGradient2)" opacity="0.4" class="pulse"/>
    <circle cx="25" cy="25" r="4" fill="#f97316" opacity="0.3" class="breathing"/>
  </g>
  
  <!-- Cylinder -->
  <g class="axonometric-container cylinder-rotate-reverse">
    <ellipse cx="65" cy="65" rx="6" ry="3" fill="url(#axonometricGradient1)" opacity="0.7" class="pulse"/>
    <ellipse cx="65" cy="65" rx="6" ry="3" fill="url(#axonometricGradient2)" opacity="0.5" class="floating"/>
    <rect x="59" y="65" width="12" height="8" fill="#0d9488" opacity="0.4" class="breathing"/>
    <ellipse cx="65" cy="73" rx="6" ry="3" fill="url(#axonometricGradient1)" opacity="0.6" class="glow"/>
  </g>
  
  <!-- Additional Geometric Elements -->
  <g class="axonometric-container cube-rotate-reverse">
    <polygon points="15,15 25,15 25,25 15,25" fill="#f97316" opacity="0.4" class="floating"/>
    <polygon points="15,15 25,15 20,10 10,10" fill="#0d9488" opacity="0.3" class="pulse"/>
  </g>
  
  <g class="axonometric-container pyramid-rotate">
    <polygon points="70,15 80,25 60,25" fill="url(#axonometricGradient2)" opacity="0.5" class="breathing"/>
    <polygon points="70,15 80,25 70,30" fill="url(#axonometricGradient1)" opacity="0.4" class="floating"/>
  </g>
  
  <!-- Connection Lines for 4D Effect -->
  <g class="axonometric-container sphere-rotate-reverse">
    <line x1="25" y1="25" x2="45" y2="45" stroke="url(#axonometricGradient1)" stroke-width="1" opacity="0.3" class="glow"/>
    <line x1="65" y1="65" x2="45" y2="45" stroke="url(#axonometricGradient2)" stroke-width="1" opacity="0.3" class="glow"/>
    <line x1="25" y1="25" x2="65" y2="65" stroke="#f97316" stroke-width="1" opacity="0.2" class="pulse"/>
  </g>
  
  <!-- Central Glow Point -->
  <circle cx="45" cy="45" r="3" fill="url(#axonometricGradient1)" opacity="0.9" class="pulse"/>
  <circle cx="45" cy="45" r="6" fill="url(#axonometricGradient2)" opacity="0.3" class="breathing"/>
  <circle cx="45" cy="45" r="9" fill="url(#axonometricGradient1)" opacity="0.1" class="glow"/>
  
  <!-- Subtle Raised Effect -->
  <ellipse cx="45" cy="52" rx="4" ry="1.5" fill="#f5f5f5" opacity="0.3" class="breathing"/>
  <ellipse cx="45" cy="53" rx="3" ry="1" fill="#f5f5f5" opacity="0.2" class="breathing"/>
</svg> 