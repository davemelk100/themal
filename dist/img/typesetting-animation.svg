<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="textGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9ca3af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Text Layout Grid -->
  <g id="layout-grid" opacity="0.1">
    <line x1="50" y1="50" x2="350" y2="50" stroke="#6b7280" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="50" y1="80" x2="350" y2="80" stroke="#6b7280" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="50" y1="110" x2="350" y2="110" stroke="#6b7280" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="50" y1="140" x2="350" y2="140" stroke="#6b7280" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="50" y1="170" x2="350" y2="170" stroke="#6b7280" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="50" y1="200" x2="350" y2="200" stroke="#6b7280" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="50" y1="230" x2="350" y2="230" stroke="#6b7280" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="50" y1="260" x2="350" y2="260" stroke="#6b7280" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  
  <!-- Animated Text Elements -->
  <g id="text-elements">
    <!-- Headline -->
    <text x="200" y="70" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="url(#textGradient1)">
      <animate attributeName="opacity" values="0;1;1;0" dur="40s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="font-size" values="24;28;24" dur="40s" repeatCount="indefinite" begin="0s"/>
      Typesetting
    </text>
    
    <!-- Subtitle -->
    <text x="200" y="100" text-anchor="middle" font-family="sans-serif" font-size="14" fill="url(#textGradient2)">
      <animate attributeName="opacity" values="0;1;1;0" dur="40s" repeatCount="indefinite" begin="5s"/>
      <animate attributeName="font-size" values="14;16;14" dur="40s" repeatCount="indefinite" begin="5s"/>
      The Art of Text Arrangement
    </text>
    
    <!-- Body Text Line 1 -->
    <text x="60" y="130" font-family="serif" font-size="12" fill="url(#textGradient1)">
      <animate attributeName="opacity" values="0;1;1;0" dur="40s" repeatCount="indefinite" begin="10s"/>
      <animate attributeName="x" values="60;65;60" dur="40s" repeatCount="indefinite" begin="10s"/>
      Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    </text>
    
    <!-- Body Text Line 2 -->
    <text x="60" y="150" font-family="serif" font-size="12" fill="url(#textGradient1)">
      <animate attributeName="opacity" values="0;1;1;0" dur="40s" repeatCount="indefinite" begin="12s"/>
      <animate attributeName="x" values="60;65;60" dur="40s" repeatCount="indefinite" begin="12s"/>
      Sed do eiusmod tempor incididunt ut labore et dolore.
    </text>
    
    <!-- Body Text Line 3 -->
    <text x="60" y="170" font-family="serif" font-size="12" fill="url(#textGradient1)">
      <animate attributeName="opacity" values="0;1;1;0" dur="40s" repeatCount="indefinite" begin="14s"/>
      <animate attributeName="x" values="60;65;60" dur="40s" repeatCount="indefinite" begin="14s"/>
      Ut enim ad minim veniam, quis nostrud exercitation.
    </text>
    
    <!-- Highlighted Text -->
    <text x="200" y="200" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="url(#highlightGradient)">
      <animate attributeName="opacity" values="0;1;1;0" dur="40s" repeatCount="indefinite" begin="18s"/>
      <animate attributeName="font-size" values="14;18;14" dur="40s" repeatCount="indefinite" begin="18s"/>
      Emphasis & Hierarchy
    </text>
    
    <!-- Caption -->
    <text x="200" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="url(#textGradient2)">
      <animate attributeName="opacity" values="0;1;1;0" dur="40s" repeatCount="indefinite" begin="22s"/>
      <animate attributeName="font-size" values="10;12;10" dur="40s" repeatCount="indefinite" begin="22s"/>
      Spacing • Alignment • Typography
    </text>
  </g>
  
  <!-- Spacing Indicators -->
  <g id="spacing-indicators" opacity="0.3">
    <line x1="50" y1="120" x2="350" y2="120" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2">
      <animate attributeName="opacity" values="0;0.6;0" dur="40s" repeatCount="indefinite" begin="8s"/>
    </line>
    <line x1="50" y1="160" x2="350" y2="160" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2">
      <animate attributeName="opacity" values="0;0.6;0" dur="40s" repeatCount="indefinite" begin="16s"/>
    </line>
    <line x1="50" y1="180" x2="350" y2="180" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2">
      <animate attributeName="opacity" values="0;0.6;0" dur="40s" repeatCount="indefinite" begin="20s"/>
    </line>
  </g>
  
  <!-- Alignment Guides -->
  <g id="alignment-guides" opacity="0.2">
    <line x1="60" y1="50" x2="60" y2="260" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2">
      <animate attributeName="opacity" values="0;0.4;0" dur="40s" repeatCount="indefinite" begin="6s"/>
    </line>
    <line x1="200" y1="50" x2="200" y2="260" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2">
      <animate attributeName="opacity" values="0;0.4;0" dur="40s" repeatCount="indefinite" begin="6s"/>
    </line>
    <line x1="340" y1="50" x2="340" y2="260" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2,2">
      <animate attributeName="opacity" values="0;0.4;0" dur="40s" repeatCount="indefinite" begin="6s"/>
    </line>
  </g>
  
  <!-- Typography Elements -->
  <g id="typography-elements">
    <!-- Letter Spacing Animation -->
    <text x="80" y="250" font-family="serif" font-size="16" fill="url(#textGradient1)">
      <animate attributeName="opacity" values="0;1;1;0" dur="40s" repeatCount="indefinite" begin="25s"/>
      KERNING
    </text>
    
    <!-- Line Height Animation -->
    <text x="200" y="250" font-family="serif" font-size="12" fill="url(#textGradient2)">
      <animate attributeName="opacity" values="0;1;1;0" dur="40s" repeatCount="indefinite" begin="30s"/>
      <animate attributeName="font-size" values="12;14;12" dur="40s" repeatCount="indefinite" begin="30s"/>
      Leading
    </text>
    
    <!-- Font Weight Animation -->
    <text x="320" y="250" font-family="serif" font-size="14" fill="url(#textGradient1)">
      <animate attributeName="opacity" values="0;1;1;0" dur="40s" repeatCount="indefinite" begin="35s"/>
      Weight
    </text>
  </g>
  
  <!-- Floating Elements -->
  <g id="floating-elements">
    <!-- Period -->
    <circle cx="340" cy="130" r="1" fill="url(#textGradient1)">
      <animate attributeName="opacity" values="0;1;0" dur="40s" repeatCount="indefinite" begin="10s"/>
      <animate attributeName="cy" values="130;125;130" dur="40s" repeatCount="indefinite" begin="10s"/>
    </circle>
    
    <!-- Comma -->
    <text x="200" y="150" font-family="serif" font-size="12" fill="url(#textGradient1)">
      <animate attributeName="opacity" values="0;1;0" dur="40s" repeatCount="indefinite" begin="12s"/>
      <animate attributeName="y" values="150;145;150" dur="40s" repeatCount="indefinite" begin="12s"/>
      ,
    </text>
    
    <!-- Quote Mark -->
    <text x="60" y="130" font-family="serif" font-size="12" fill="url(#highlightGradient)">
      <animate attributeName="opacity" values="0;1;0" dur="40s" repeatCount="indefinite" begin="10s"/>
      <animate attributeName="font-size" values="12;14;12" dur="40s" repeatCount="indefinite" begin="10s"/>
      "
    </text>
  </g>
</svg> 