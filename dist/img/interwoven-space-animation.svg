<svg width="90" height="90" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .layer {
        animation: breathe 120s ease-in-out infinite;
      }
      .layer:nth-child(1) { animation-delay: 0s; }
      .layer:nth-child(2) { animation-delay: -24s; }
      .layer:nth-child(3) { animation-delay: -48s; }
      .layer:nth-child(4) { animation-delay: -72s; }
      .layer:nth-child(5) { animation-delay: -96s; }
      
      .dot {
        animation: pulse 120s ease-in-out infinite;
      }
      .dot:nth-child(1) { animation-delay: 0s; }
      .dot:nth-child(2) { animation-delay: -20s; }
      .dot:nth-child(3) { animation-delay: -40s; }
      .dot:nth-child(4) { animation-delay: -60s; }
      .dot:nth-child(5) { animation-delay: -80s; }
      .dot:nth-child(6) { animation-delay: -100s; }
      

      
      @keyframes breathe {
        0%, 100% { 
          transform: scale(1) rotate(0deg);
          opacity: 0.8;
        }
        50% { 
          transform: scale(1.1) rotate(180deg);
          opacity: 0.4;
        }
      }
      
      @keyframes pulse {
        0%, 100% { 
          opacity: 0.3;
          transform: scale(0.8);
        }
        50% { 
          opacity: 0.9;
          transform: scale(1.2);
        }
      }
      

    </style>
  </defs>
  
  <!-- Mid-Century Modern Concentric Layers - Warm Grays -->
  <circle class="layer" cx="45" cy="45" r="15" fill="#A67C52" opacity="0.8"/>
  <circle class="layer" cx="45" cy="45" r="5" fill="#8B7355" opacity="0.9"/>
  
  <!-- Center Lightbulb SVG -->
  <g class="lightbulb">
    <!-- Lightbulb Glass - More bulbous shape -->
    <path d="M 37 30 Q 37 25 45 25 Q 53 25 53 30 Q 53 45 45 45 Q 37 45 37 30 Z" fill="#F8F8F0" opacity="0.95" stroke="#8B7355" stroke-width="0.3"/>
    <!-- Lightbulb Neck -->
    <rect x="43" y="45" width="4" height="3" rx="1" fill="#E8E8E8" opacity="0.9"/>
    <!-- Lightbulb Base/Socket -->
    <rect x="41" y="48" width="8" height="5" rx="1.5" fill="#A67C52"/>
    <!-- Lightbulb Base Threads -->
    <rect x="42" y="49" width="6" height="3" rx="0.5" fill="#8B7355" opacity="0.7"/>
    <!-- Lightbulb Support Wires -->
    <line x1="41" y1="35" x2="41" y2="38" stroke="#C0C0C0" stroke-width="0.3"/>
    <line x1="49" y1="35" x2="49" y2="38" stroke="#C0C0C0" stroke-width="0.3"/>
    <!-- Lightbulb Filaments - More realistic -->
    <g class="lightbulb-filament">
      <path d="M 41 35 Q 45 32 49 35" stroke="#D2691E" stroke-width="0.8" fill="none"/>
      <path d="M 41 37 Q 45 34 49 37" stroke="#20B2AA" stroke-width="0.8" fill="none"/>
      <path d="M 41 39 Q 45 36 49 39" stroke="#CD853F" stroke-width="0.8" fill="none"/>
    </g>
    <!-- Lightbulb Center Support -->
    <line x1="45" y1="32" x2="45" y2="42" stroke="#C0C0C0" stroke-width="0.2"/>
    <!-- Lightbulb Glow Effect -->
    <circle cx="45" cy="35" r="10" fill="url(#glow)" opacity="0.4"/>
  </g>
  
  <!-- Lightbulb Glow Gradient -->
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F9C22E" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#D2691E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B7355" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Mid-Century Modern Corner Elements - Muted Orange and Teal -->
  <rect class="dot" x="18" y="18" width="6" height="6" rx="1" fill="#D2691E"/>
  <rect class="dot" x="66" y="18" width="6" height="6" rx="1" fill="#20B2AA"/>
  <rect class="dot" x="18" y="66" width="6" height="6" rx="1" fill="#CD853F"/>
  <rect class="dot" x="66" y="66" width="6" height="6" rx="1" fill="#48D1CC"/>
  
  <!-- Mid-Century Modern Center Accents -->
  <circle class="dot" cx="45" cy="15" r="3" fill="#8B7355"/>
  <circle class="dot" cx="45" cy="75" r="3" fill="#A67C52"/>
  
  <!-- AI Interface Elements -->
  <rect x="35" y="25" width="4" height="4" rx="0.5" fill="#C4A484" opacity="0.6" class="dot"/>
  <rect x="51" y="25" width="4" height="4" rx="0.5" fill="#D2B48C" opacity="0.6" class="dot"/>
  <rect x="35" y="61" width="4" height="4" rx="0.5" fill="#A67C52" opacity="0.6" class="dot"/>
  <rect x="51" y="61" width="4" height="4" rx="0.5" fill="#8B7355" opacity="0.6" class="dot"/>
</svg> 