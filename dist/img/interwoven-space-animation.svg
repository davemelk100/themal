<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fractalGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="fractalGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Fractal Structure -->
  <g transform="translate(200, 150)">
    <!-- Primary Fractal -->
    <g class="primary-fractal">
      <!-- Outer Ring -->
      <circle cx="0" cy="0" r="80" fill="none" stroke="url(#fractalGradient1)" stroke-width="2" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="20s" repeatCount="indefinite"/>
      </circle>
      
      <!-- Inner Fractal Pattern -->
      <g class="inner-fractal" transform="rotate(0)">
        <circle cx="0" cy="0" r="60" fill="none" stroke="url(#fractalGradient2)" stroke-width="1.5" opacity="0.7">
          <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="15s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Fractal Branches -->
        <g class="fractal-branches">
          <!-- Branch 1 -->
          <line x1="0" y1="-60" x2="0" y2="-40" stroke="url(#fractalGradient1)" stroke-width="2" opacity="0.8">
            <animateTransform attributeName="transform" type="rotate" values="0;360" dur="12s" repeatCount="indefinite"/>
          </line>
          <circle cx="0" cy="-40" r="8" fill="url(#fractalGradient1)" opacity="0.9">
            <animateTransform attributeName="transform" type="rotate" values="0;360" dur="12s" repeatCount="indefinite"/>
          </circle>
          
          <!-- Branch 2 -->
          <line x1="0" y1="60" x2="0" y2="40" stroke="url(#fractalGradient2)" stroke-width="2" opacity="0.8">
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="10s" repeatCount="indefinite"/>
          </line>
          <circle cx="0" cy="40" r="6" fill="url(#fractalGradient2)" opacity="0.9">
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="10s" repeatCount="indefinite"/>
          </circle>
          
          <!-- Branch 3 -->
          <line x1="-60" y1="0" x2="-40" y2="0" stroke="url(#fractalGradient1)" stroke-width="2" opacity="0.8">
            <animateTransform attributeName="transform" type="rotate" values="0;360" dur="14s" repeatCount="indefinite"/>
          </line>
          <circle cx="-40" cy="0" r="7" fill="url(#fractalGradient1)" opacity="0.9">
            <animateTransform attributeName="transform" type="rotate" values="0;360" dur="14s" repeatCount="indefinite"/>
          </circle>
          
          <!-- Branch 4 -->
          <line x1="60" y1="0" x2="40" y2="0" stroke="url(#fractalGradient2)" stroke-width="2" opacity="0.8">
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="16s" repeatCount="indefinite"/>
          </line>
          <circle cx="40" cy="0" r="5" fill="url(#fractalGradient2)" opacity="0.9">
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="16s" repeatCount="indefinite"/>
          </circle>
        </g>
        
        <!-- Secondary Fractal Rings -->
        <g class="secondary-rings">
          <circle cx="0" cy="0" r="40" fill="none" stroke="url(#fractalGradient1)" stroke-width="1" opacity="0.5">
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/>
          </circle>
          <circle cx="0" cy="0" r="30" fill="none" stroke="url(#fractalGradient2)" stroke-width="1" opacity="0.6">
            <animateTransform attributeName="transform" type="rotate" values="0;360" dur="22s" repeatCount="indefinite"/>
          </circle>
        </g>
      </g>
      
      <!-- Floating Particles -->
      <g class="particles">
        <circle cx="0" cy="0" r="2" fill="#f97316" opacity="0.8" filter="url(#glow)">
          <animate attributeName="cx" values="0;20;0;-20;0" dur="8s" repeatCount="indefinite"/>
          <animate attributeName="cy" values="0;-20;0;20;0" dur="8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="1.5" fill="#0d9488" opacity="0.7" filter="url(#glow)">
          <animate attributeName="cx" values="0;-15;0;15;0" dur="6s" repeatCount="indefinite"/>
          <animate attributeName="cy" values="0;15;0;-15;0" dur="6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="1" fill="#f97316" opacity="0.6" filter="url(#glow)">
          <animate attributeName="cx" values="0;25;0;-25;0" dur="10s" repeatCount="indefinite"/>
          <animate attributeName="cy" values="0;-25;0;25;0" dur="10s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;0.9;0.6" dur="5s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
    
    <!-- Core Center -->
    <circle cx="0" cy="0" r="15" fill="url(#fractalGradient1)" opacity="0.9">
      <animate attributeName="r" values="15;18;15" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="8" fill="url(#fractalGradient2)" opacity="1">
      <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Ambient Glow -->
  <circle cx="200" cy="150" r="120" fill="none" stroke="url(#fractalGradient1)" stroke-width="1" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg> 