<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .layer-group {
        transform-origin: 45px 45px;
      }
      
      .base-layer {
        animation: baseReveal 30s ease-in-out infinite;
      }
      
      .detail-layer {
        animation: detailReveal 25s ease-in-out infinite 5s;
      }
      
      .context-layer {
        animation: contextReveal 35s ease-in-out infinite 10s;
      }
      
      .focus-element {
        animation: focusPulse 8s ease-in-out infinite;
      }
      
      .progressive-line {
        animation: progressiveFlow 20s ease-in-out infinite;
      }
      
      @keyframes baseReveal {
        0%, 100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        25% {
          opacity: 0.7;
          transform: scale(1);
        }
        50% {
          opacity: 0.9;
          transform: scale(1.1);
        }
        75% {
          opacity: 0.6;
          transform: scale(0.95);
        }
      }
      
      @keyframes detailReveal {
        0%, 100% {
          opacity: 0.1;
          transform: scale(0.6) translateY(10px);
        }
        33% {
          opacity: 0.5;
          transform: scale(0.9) translateY(5px);
        }
        66% {
          opacity: 0.8;
          transform: scale(1.05) translateY(0px);
        }
      }
      
      @keyframes contextReveal {
        0%, 100% {
          opacity: 0.05;
          transform: scale(0.4) translateY(15px);
        }
        25% {
          opacity: 0.2;
          transform: scale(0.7) translateY(10px);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.9) translateY(5px);
        }
        75% {
          opacity: 0.6;
          transform: scale(1) translateY(0px);
        }
      }
      
      @keyframes focusPulse {
        0%, 100% {
          opacity: 0.4;
          transform: scale(1);
        }
        50% {
          opacity: 0.9;
          transform: scale(1.15);
        }
      }
      
      @keyframes progressiveFlow {
        0%, 100% {
          opacity: 0.1;
          stroke-dasharray: 0, 100;
        }
        50% {
          opacity: 0.6;
          stroke-dasharray: 100, 0;
        }
      }
    </style>
  </defs>
  
  <!-- Background Grid (Context) -->
  <g class="layer-group">
    <line x1="10" y1="10" x2="80" y2="10" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    <line x1="10" y1="25" x2="80" y2="25" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    <line x1="10" y1="40" x2="80" y2="40" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    <line x1="10" y1="55" x2="80" y2="55" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    <line x1="10" y1="70" x2="80" y2="70" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    <line x1="10" y1="85" x2="80" y2="85" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    
    <line x1="10" y1="10" x2="10" y2="85" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    <line x1="25" y1="10" x2="25" y2="85" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    <line x1="40" y1="10" x2="40" y2="85" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    <line x1="55" y1="10" x2="55" y2="85" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    <line x1="70" y1="10" x2="70" y2="85" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
    <line x1="85" y1="10" x2="85" y2="85" stroke="#e0e0e0" stroke-width="0.2" opacity="0.1" class="context-layer"/>
  </g>
  
  <!-- Base Layer (Primary Information) -->
  <g class="layer-group">
    <rect x="25" y="25" width="40" height="40" rx="4" fill="#4A5568" class="base-layer"/>
    <rect x="30" y="30" width="30" height="30" rx="2" fill="#718096" opacity="0.8" class="base-layer"/>
  </g>
  
  <!-- Detail Layer (Secondary Information) -->
  <g class="layer-group">
    <circle cx="35" cy="35" r="3" fill="#A0AEC0" class="detail-layer"/>
    <circle cx="50" cy="35" r="3" fill="#A0AEC0" class="detail-layer"/>
    <circle cx="35" cy="50" r="3" fill="#A0AEC0" class="detail-layer"/>
    <circle cx="50" cy="50" r="3" fill="#A0AEC0" class="detail-layer"/>
    
    <rect x="40" y="40" width="10" height="10" rx="1" fill="#CBD5E0" class="detail-layer"/>
  </g>
  
  <!-- Focus Element (Highlighted Information) -->
  <g class="layer-group">
    <circle cx="45" cy="45" r="4" fill="#2D3748" class="focus-element"/>
    <circle cx="45" cy="45" r="2" fill="#E2E8F0" opacity="0.9" class="focus-element"/>
  </g>
  
  <!-- Progressive Disclosure Lines -->
  <g class="layer-group">
    <path d="M 20 45 Q 45 20 70 45" stroke="#4A5568" stroke-width="1" fill="none" class="progressive-line"/>
    <path d="M 20 60 Q 45 35 70 60" stroke="#718096" stroke-width="0.8" fill="none" class="progressive-line"/>
    <path d="M 20 75 Q 45 50 70 75" stroke="#A0AEC0" stroke-width="0.6" fill="none" class="progressive-line"/>
  </g>
  
  <!-- Information Hierarchy Indicators -->
  <g class="layer-group">
    <line x1="15" y1="20" x2="25" y2="20" stroke="#4A5568" stroke-width="1.5" opacity="0.6" class="base-layer"/>
    <line x1="15" y1="25" x2="22" y2="25" stroke="#718096" stroke-width="1" opacity="0.5" class="detail-layer"/>
    <line x1="15" y1="30" x2="20" y2="30" stroke="#A0AEC0" stroke-width="0.8" opacity="0.4" class="context-layer"/>
  </g>
  
  <!-- Reveal Indicators -->
  <g class="layer-group">
    <circle cx="75" cy="25" r="2" fill="#4A5568" opacity="0.7" class="base-layer"/>
    <circle cx="75" cy="35" r="1.5" fill="#718096" opacity="0.6" class="detail-layer"/>
    <circle cx="75" cy="45" r="1" fill="#A0AEC0" opacity="0.5" class="context-layer"/>
  </g>
</svg> 