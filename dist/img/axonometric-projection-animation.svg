<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .cube-group {
        transform-origin: 45px 45px;
      }
      
      .main-cube {
        animation: rotateCube 25s linear infinite;
      }
      
      .inner-cube {
        animation: rotateInner 30s linear infinite reverse;
      }
      
      .projection-lines {
        animation: fadeProjection 8s ease-in-out infinite;
      }
      
      .grid-lines {
        animation: fadeGrid 12s ease-in-out infinite;
      }
      
      .axis-lines {
        animation: pulseAxis 6s ease-in-out infinite;
      }
      
      @keyframes rotateCube {
        0% {
          transform: rotateX(45deg) rotateY(45deg) rotateZ(0deg);
        }
        25% {
          transform: rotateX(45deg) rotateY(45deg) rotateZ(45deg);
        }
        50% {
          transform: rotateX(45deg) rotateY(45deg) rotateZ(90deg);
        }
        75% {
          transform: rotateX(45deg) rotateY(45deg) rotateZ(45deg);
        }
        100% {
          transform: rotateX(45deg) rotateY(45deg) rotateZ(0deg);
        }
      }
      
      @keyframes rotateInner {
        0% {
          transform: rotateX(-30deg) rotateY(-30deg) rotateZ(0deg) scale(0.7);
        }
        25% {
          transform: rotateX(-30deg) rotateY(-30deg) rotateZ(-45deg) scale(0.7);
        }
        50% {
          transform: rotateX(-30deg) rotateY(-30deg) rotateZ(-90deg) scale(0.7);
        }
        75% {
          transform: rotateX(-30deg) rotateY(-30deg) rotateZ(-45deg) scale(0.7);
        }
        100% {
          transform: rotateX(-30deg) rotateY(-30deg) rotateZ(0deg) scale(0.7);
        }
      }
      
      @keyframes fadeProjection {
        0%, 100% {
          opacity: 0.2;
          stroke-width: 0.5;
        }
        50% {
          opacity: 0.6;
          stroke-width: 1;
        }
      }
      
      @keyframes fadeGrid {
        0%, 100% {
          opacity: 0.1;
        }
        50% {
          opacity: 0.3;
        }
      }
      
      @keyframes pulseAxis {
        0%, 100% {
          opacity: 0.4;
          stroke-width: 1;
        }
        50% {
          opacity: 0.8;
          stroke-width: 1.5;
        }
      }
    </style>
  </defs>
  
  <!-- Background Grid (Reference plane) -->
  <g class="grid-lines">
    <line x1="15" y1="75" x2="75" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.1"/>
    <line x1="15" y1="60" x2="75" y2="60" stroke="#e0e0e0" stroke-width="0.3" opacity="0.1"/>
    <line x1="15" y1="45" x2="75" y2="45" stroke="#e0e0e0" stroke-width="0.3" opacity="0.1"/>
    <line x1="15" y1="30" x2="75" y2="30" stroke="#e0e0e0" stroke-width="0.3" opacity="0.1"/>
    <line x1="15" y1="15" x2="75" y2="15" stroke="#e0e0e0" stroke-width="0.3" opacity="0.1"/>
    
    <line x1="15" y1="15" x2="15" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.1"/>
    <line x1="30" y1="15" x2="30" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.1"/>
    <line x1="45" y1="15" x2="45" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.1"/>
    <line x1="60" y1="15" x2="60" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.1"/>
    <line x1="75" y1="15" x2="75" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.1"/>
  </g>
  
  <!-- Main Cube (Axonometric projection) -->
  <g class="cube-group">
    <g class="main-cube">
      <!-- Front face -->
      <polygon points="25,45 45,25 65,45 45,65" fill="#4A5568" opacity="0.8"/>
      <!-- Top face -->
      <polygon points="25,45 45,25 55,35 35,55" fill="#718096" opacity="0.6"/>
      <!-- Right face -->
      <polygon points="45,25 65,45 55,55 35,35" fill="#A0AEC0" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Inner Cube (Nested structure) -->
  <g class="cube-group">
    <g class="inner-cube">
      <!-- Front face -->
      <polygon points="30,45 45,30 60,45 45,60" fill="#4A5568" opacity="0.5"/>
      <!-- Top face -->
      <polygon points="30,45 45,30 52,37 37,52" fill="#718096" opacity="0.4"/>
      <!-- Right face -->
      <polygon points="45,30 60,45 52,52 37,37" fill="#A0AEC0" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Projection Lines (Show depth relationships) -->
  <g class="projection-lines">
    <line x1="45" y1="45" x2="45" y2="75" stroke="#4A5568" stroke-width="0.5" opacity="0.3"/>
    <line x1="25" y1="45" x2="25" y2="75" stroke="#718096" stroke-width="0.5" opacity="0.3"/>
    <line x1="65" y1="45" x2="65" y2="75" stroke="#A0AEC0" stroke-width="0.5" opacity="0.3"/>
    <line x1="45" y1="25" x2="45" y2="75" stroke="#CBD5E0" stroke-width="0.5" opacity="0.3"/>
  </g>
  
  <!-- Axis Lines (X, Y, Z axes) -->
  <g class="axis-lines">
    <!-- X-axis (horizontal) -->
    <line x1="15" y1="75" x2="75" y2="75" stroke="#4A5568" stroke-width="1" opacity="0.4"/>
    <!-- Y-axis (vertical) -->
    <line x1="45" y1="15" x2="45" y2="75" stroke="#718096" stroke-width="1" opacity="0.4"/>
    <!-- Z-axis (depth) -->
    <line x1="45" y1="75" x2="65" y2="55" stroke="#A0AEC0" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Corner Points (Emphasize vertices) -->
  <g class="cube-group">
    <circle cx="25" cy="45" r="2" fill="#4A5568" opacity="0.8"/>
    <circle cx="45" cy="25" r="2" fill="#718096" opacity="0.8"/>
    <circle cx="65" cy="45" r="2" fill="#A0AEC0" opacity="0.8"/>
    <circle cx="45" cy="65" r="2" fill="#CBD5E0" opacity="0.8"/>
    <circle cx="55" cy="35" r="1.5" fill="#4A5568" opacity="0.6"/>
    <circle cx="35" cy="55" r="1.5" fill="#718096" opacity="0.6"/>
  </g>
  
  <!-- Depth Indicators (Show equal foreshortening) -->
  <g class="projection-lines">
    <line x1="25" y1="45" x2="35" y2="35" stroke="#4A5568" stroke-width="0.3" opacity="0.2"/>
    <line x1="65" y1="45" x2="55" y2="35" stroke="#A0AEC0" stroke-width="0.3" opacity="0.2"/>
    <line x1="45" y1="25" x2="35" y2="35" stroke="#718096" stroke-width="0.3" opacity="0.2"/>
    <line x1="45" y1="65" x2="35" y2="55" stroke="#CBD5E0" stroke-width="0.3" opacity="0.2"/>
  </g>
</svg> 